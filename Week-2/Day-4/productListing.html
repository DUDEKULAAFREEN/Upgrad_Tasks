<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electronics Store</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">

        <!-- Page Title -->
        <h2 class="text-center mb-4">Electronics Store</h2>

        <div class="row g-4">

            <!-- Product 1 -->
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card h-100 shadow-sm">
                    <img src="D:\CTS_Training\WEEK-2\Day-4\pc_img.avif" class="card-img-top" alt="Laptop">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Laptop</h5>
                        <p class="card-text">High performance laptop for work and gaming.</p>
                        <div class="mt-auto">
                            <button class="btn btn-primary btn-sm me-2">Add to Cart</button><br><br>
                            <button class="btn btn-outline-secondary btn-sm">View Details</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card h-100 shadow-sm">
                    <img src="D:\CTS_Training\WEEK-2\Day-4\phone.jpg" class="card-img-top" alt="Mobile">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Smartphone</h5>
                        <p class="card-text">Latest smartphone with advanced features.</p>
                        <div class="mt-auto">
                            <button class="btn btn-primary btn-sm me-2">Add to Cart</button><br><br>
                            <button class="btn btn-outline-secondary btn-sm">View Details</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card h-100 shadow-sm">
                    <img src="D:\CTS_Training\WEEK-2\Day-4\headphones.jpg" class="card-img-top" alt="Headphones">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Headphones</h5>
                        <p class="card-text">Noise cancelling wireless headphones.</p>
                        <div class="mt-auto">
                            <button class="btn btn-primary btn-sm me-2">Add to Cart</button><br><br>
                            <button class="btn btn-outline-secondary btn-sm">View Details</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product 4 -->
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card h-100 shadow-sm">
                    <img src="D:\CTS_Training\WEEK-2\Day-4\watch.jpg" class="card-img-top" alt="Smart Watch">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Smart Watch</h5>
                        <p class="card-text">Track your health and fitness easily.</p>
                        <div class="mt-auto">
                            <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
                            <br><br>
                            <button class="btn btn-outline-secondary btn-sm">View Details</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
