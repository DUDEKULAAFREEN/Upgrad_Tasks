<!DOCTYPE html>
<html>
<head>
    <title>Feedback Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        button {
            background-color: rgb(0, 153, 255);
            color: white;
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(0, 58, 139);
        }

        #message {
            margin-top: 15px;
            color: green;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>Feedback Form</h2>

    <button id="feedbackBtn">Submit Feedback</button>

    <p id="message"></p>

    <script>
        var button = document.getElementById("feedbackBtn");

        button.addEventListener("click", function() {
            var message = document.getElementById("message");
            message.textContent = "Thank you! Your feedback has been submitted successfully.";
        });
    </script>

</body>
</html>
